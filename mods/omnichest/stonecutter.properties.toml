# =====================================================================
# stonecutter.properties.toml (Stonecutter centralized + per-node props)
# ---------------------------------------------------------------------
#   正本は mc-meta/versions.json + mc-meta/<MC>.properties。
#   このファイルはそこから生成する想定 (現状は手生成)。
#   build.gradle.kts は sc.properties["deps.*"] で読む。
#
#   注意: Stonecutter は実行時に versions/ ディレクトリを生成するため、
#   Mod のバージョンメタデータは mc-meta/ に退避してある。
# =====================================================================

# loom-back-compat が使う Loom バージョン (全ノード共通)
loomx.loom_version = "1.16-SNAPSHOT"

# ---- MC 26.1 系 (非難読化版・Java25) ----
["26.1"]
deps.fabric_loader = "0.19.3"
