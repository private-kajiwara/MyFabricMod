# =====================================================================
# mods/visualizegate/gradle.properties (Stonecutter included build)
# ---------------------------------------------------------------------
#   Gradle 実行オプション + Mod メタデータ。
#   per-version の依存 (loader/api/java) は stonecutter.properties.toml が
#   正本 (mc-meta/versions.json から生成) で管理する。
#   mod_id / mod_version / maven_group は :common (Groovy) からも
#   rootProject.findProperty(...) で参照されるためここに置く。
# =====================================================================

# JVM / Gradle
org.gradle.jvmargs=-Xmx2G
org.gradle.parallel=true
# Loom が configuration cache に未対応のため無効化 (Fabric Loom #1349)
org.gradle.configuration-cache=false

# Mod メタデータ
mod_id=visualizegate
mod_version=0.96.0
maven_group=com.kajiwara
