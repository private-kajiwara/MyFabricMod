# =====================================================================
# versions/26.1.properties
# ---------------------------------------------------------------------
#   Minecraft 26.1 ターゲットのメタデータ (年ベース新バージョニング)。
#
#   ★ 26.1 以降は Mojang が「非難読化 (unobfuscated)」 jar を配布する。
#     よって Yarn / intermediary / Mojang mappings は *設計上存在しない* (恒久)。
#     ビルドは非remap Loom (net.fabricmc.fabric-loom) を使い mappings 行は持たない。
#     参考: Fabric example-mod の 26.1 ブランチ / fabricmc.net/develop
#
#   値の出所 (2026-06 時点で実値をライブ取得):
#     - minecraft_version : Mojang manifest で release として実在確認
#     - loader_version    : https://meta.fabricmc.net/v2/versions/loader/26.1
#     - fabric_api_version: Modrinth fabric-api (suffix '+26.1' の最新)
#     - java_version      : Mojang manifest javaVersion.majorVersion = 25
# =====================================================================

minecraft_version=26.1
loader_version=0.19.3
fabric_api_version=0.145.1+26.1
yarn_mappings=

# 同梱する任意 mod (空にすれば同梱しない)
#   ModMenu: 26.1 系対応は 18.0.0-beta.1 が最新 (Modrinth 実値)
#   Cloth Config: ソース内で未使用のため同梱しない
mod_menu_version=18.0.0-beta.1
cloth_config_version=

# 必要 Java バージョン (toolchain で固定)
java_version=25

# 非難読化版 → 非remap Loom + mappings 無し + jar をそのまま配布
remap=false
