# =====================================================================
# versions/1.21.11.properties
# ---------------------------------------------------------------------
#   Minecraft 1.21.11 ターゲットのメタデータ。
#
#   このファイルは versions/versions.json から参照され、
#   build / validateVersions / CI matrix から動的に読み込まれる。
#
#   値の出所:
#     - minecraft_version : Mojang manifest で実在確認
#     - loader_version    : https://meta.fabricmc.net/v2/versions/loader
#     - fabric_api_version: https://maven.fabricmc.net/net/fabricmc/fabric-api/fabric-api/
#     - yarn_mappings     : https://meta.fabricmc.net/v2/versions/yarn/1.21.11
#
#   "存在しないバージョン" を書くと validateVersions が失敗する。
# =====================================================================

minecraft_version=1.21.11
loader_version=0.19.2
fabric_api_version=0.141.3+1.21.11
yarn_mappings=1.21.11+build.1

# 同梱する任意 mod (空にすれば同梱しない)
mod_menu_version=17.0.0
cloth_config_version=21.11.153

# 推奨 Java バージョン (toolchain で固定)
java_version=21
