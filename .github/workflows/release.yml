# =====================================================================
# .github/workflows/release.yml
# ---------------------------------------------------------------------
#   v* tag push で、 mods/*/versions/versions.json に登録された全 MC
#   バージョンの jar をビルドし、 1 つの draft GitHub Release に添付する。
#   バージョン一覧は ./gradlew printVersionsJson から動的生成する (Mod 非依存)。
#
#   タグ命名: v1.2.3 (semver)
# =====================================================================

name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  prepare-matrix:
    runs-on: ubuntu-24.04
    outputs:
      versions: ${{ steps.read.outputs.versions }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          # 26.1.x はデーモンが JDK25 で動く必要。 1.21.11 は toolchain=21。
          java-version: |
            21
            25
      - run: chmod +x ./gradlew
      - id: read
        shell: bash
        run: |
          MATRIX=$(./gradlew -q printVersionsJson)
          echo "versions=$MATRIX" >> "$GITHUB_OUTPUT"

  validate:
    needs: prepare-matrix
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          # 26.1.x はデーモンが JDK25 で動く必要。 1.21.11 は toolchain=21。
          java-version: |
            21
            25
      - run: chmod +x ./gradlew
      - run: ./gradlew validateVersions --stacktrace

  build:
    needs: [prepare-matrix, validate]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        minecraft: ${{ fromJson(needs.prepare-matrix.outputs.versions) }}
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          # 26.1.x はデーモンが JDK25 で動く必要。 1.21.11 は toolchain=21。
          java-version: |
            21
            25
      - run: chmod +x ./gradlew

      - name: build MC ${{ matrix.minecraft }}
        run: |
          TASK="build$(echo '${{ matrix.minecraft }}' | tr '.' '_')"
          # デーモン=JDK25 で 1.21.11 ノードの toolchain=21 を解決するため、
          # setup-java が入れた JDK を Gradle の toolchain 探索に渡す。
          ./gradlew "$TASK" --stacktrace \
            "-Dorg.gradle.java.installations.fromEnv=JAVA_HOME_21_X64,JAVA_HOME_25_X64"

      - uses: actions/upload-artifact@v7
        with:
          name: jars-${{ matrix.minecraft }}
          # 旧来 Mod: mods/<modid>/fabric/build/libs/<MC>/*-fabric.jar
          # Stonecutter Mod: mods/<modid>/versions/<MC>/build/libs/*.jar (sources 除外)
          path: |
            mods/*/fabric/build/libs/**/*-fabric.jar
            mods/*/versions/*/build/libs/*.jar
            !mods/*/versions/*/build/libs/*-sources.jar

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: download all jars
        uses: actions/download-artifact@v6
        with:
          path: dist
          pattern: jars-*
          merge-multiple: true

      - name: list collected jars
        run: ls -lah dist

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: true
          files: |
            dist/*.jar
