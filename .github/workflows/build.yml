# =====================================================================
# .github/workflows/build.yml
# ---------------------------------------------------------------------
#   push / PR で、 mods/*/versions/versions.json に登録された "実在する MC
#   バージョン" だけを対象に matrix build を回す。
#   バージョンはハードコードせず、 ./gradlew printVersionsJson から動的生成する
#   (全 Mod の buildable な MC の和集合 = Mod 非依存)。
# =====================================================================

name: build

on:
  push:
    branches: ['**']
    tags-ignore: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------
  # ① versions.json をパースして matrix を組み立てる
  # -------------------------------------------------------------------
  prepare-matrix:
    runs-on: ubuntu-24.04
    outputs:
      versions: ${{ steps.read.outputs.versions }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          # 26.1.x は Java 25 (Gradle デーモン自身が JDK25 で動く必要がある)。
          # 1.21.11 は toolchain=21。 両方入れ、 最後の 25 が JAVA_HOME=デーモンになる。
          java-version: |
            21
            25
      - run: chmod +x ./gradlew

      - name: build matrix from all mods' versions.json
        id: read
        shell: bash
        run: |
          # 全 Mod (mods/*/versions/versions.json) の buildable な MC を
          # 和集合・重複排除した JSON 配列を Gradle から得る (Mod 非依存)。
          # maven.terraformersmc.com (modmenu beta) が時々 HTTP 400 を返す一過性障害が
          # あるため、 Gradle 起動は最大 5 回リトライ (until=条件なので set -e で即死しない)。
          attempt=1; max=5
          until MATRIX=$(./gradlew -q printVersionsJson); do
            if [ "$attempt" -ge "$max" ]; then
              echo "::error::printVersionsJson failed after $max attempts"; exit 1
            fi
            attempt=$((attempt + 1))
            echo "::warning::printVersionsJson attempt failed (transient maven?); retry $attempt/$max in 45s"
            sleep 45
          done
          echo "matrix => $MATRIX"
          echo "versions=$MATRIX" >> "$GITHUB_OUTPUT"

  # -------------------------------------------------------------------
  # ② Mojang / Fabric Meta API で実在性検証
  #    (validation 失敗時は build job を実行しない)
  # -------------------------------------------------------------------
  validate:
    needs: prepare-matrix
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          # 26.1.x は Java 25 (Gradle デーモン自身が JDK25 で動く必要がある)。
          # 1.21.11 は toolchain=21。 両方入れ、 最後の 25 が JAVA_HOME=デーモンになる。
          java-version: |
            21
            25
      - run: chmod +x ./gradlew
      - name: validateVersions
        shell: bash
        run: |
          # maven (modmenu beta) の一過性 400 に備え最大 5 回リトライ。
          attempt=1; max=5
          until ./gradlew validateVersions --stacktrace; do
            if [ "$attempt" -ge "$max" ]; then
              echo "::error::validateVersions failed after $max attempts"; exit 1
            fi
            attempt=$((attempt + 1))
            echo "::warning::validateVersions attempt failed (transient maven?); retry $attempt/$max in 45s"
            sleep 45
          done

  # -------------------------------------------------------------------
  # ③ matrix の各 MC バージョンを並列ビルド
  # -------------------------------------------------------------------
  build:
    needs: [prepare-matrix, validate]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        minecraft: ${{ fromJson(needs.prepare-matrix.outputs.versions) }}
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          # 26.1.x は Java 25 (Gradle デーモン自身が JDK25 で動く必要がある)。
          # 1.21.11 は toolchain=21。 両方入れ、 最後の 25 が JAVA_HOME=デーモンになる。
          java-version: |
            21
            25
      - run: chmod +x ./gradlew

      - name: build MC ${{ matrix.minecraft }}
        shell: bash
        run: |
          TASK="build$(echo '${{ matrix.minecraft }}' | tr '.' '_')"
          echo "→ ./gradlew $TASK"
          # setup-java が入れた JDK を Gradle の toolchain 探索に渡す
          # (デーモン=JDK25 で 1.21.11 ノードの toolchain=21 を解決するため)。
          # maven.terraformersmc.com (modmenu beta) の一過性 HTTP 400 に備え最大 5 回リトライ
          # (until=条件評価なので set -e で即死しない・本物のコンパイル失敗は 3 回で確定し exit 1)。
          attempt=1; max=5
          until ./gradlew "$TASK" --stacktrace \
            "-Dorg.gradle.java.installations.fromEnv=JAVA_HOME_21_X64,JAVA_HOME_25_X64"; do
            if [ "$attempt" -ge "$max" ]; then
              echo "::error::$TASK failed after $max attempts"; exit 1
            fi
            attempt=$((attempt + 1))
            echo "::warning::$TASK attempt failed (transient maven?); retry $attempt/$max in 45s"
            sleep 45
          done

      - uses: actions/upload-artifact@v7
        with:
          name: mods-mc${{ matrix.minecraft }}
          # 旧来 Mod: mods/<modid>/fabric/build/libs/<MC>/*-fabric.jar
          # Stonecutter Mod: mods/<modid>/versions/<MC>/build/libs/*.jar
          #   (sources は除外)
          path: |
            mods/*/fabric/build/libs/**/*-fabric.jar
            mods/*/versions/*/build/libs/*.jar
            !mods/*/versions/*/build/libs/*-sources.jar
          if-no-files-found: warn
