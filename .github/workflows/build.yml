# =====================================================================
# .github/workflows/build.yml
# ---------------------------------------------------------------------
#   push / PR で、 versions/versions.json に登録された "実在する MC
#   バージョン" だけを対象に matrix build を回す。
#   バージョンはハードコードせず、 versions.json から動的生成する。
# =====================================================================

name: build

on:
  push:
    branches: ['**']
    tags-ignore: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------
  # ① versions.json をパースして matrix を組み立てる
  # -------------------------------------------------------------------
  prepare-matrix:
    runs-on: ubuntu-24.04
    outputs:
      versions: ${{ steps.read.outputs.versions }}
    steps:
      - uses: actions/checkout@v6

      - name: build matrix from versions.json
        id: read
        shell: bash
        run: |
          if [ ! -f versions/versions.json ]; then
            echo "ERROR: versions/versions.json が見つかりません"
            exit 1
          fi
          MATRIX=$(jq -c '[.versions[].minecraft]' versions/versions.json)
          echo "matrix => $MATRIX"
          echo "versions=$MATRIX" >> "$GITHUB_OUTPUT"

  # -------------------------------------------------------------------
  # ② Mojang / Fabric Meta API で実在性検証
  #    (validation 失敗時は build job を実行しない)
  # -------------------------------------------------------------------
  validate:
    needs: prepare-matrix
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x ./gradlew
      - name: validateVersions
        run: ./gradlew validateVersions --stacktrace

  # -------------------------------------------------------------------
  # ③ matrix の各 MC バージョンを並列ビルド
  # -------------------------------------------------------------------
  build:
    needs: [prepare-matrix, validate]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        minecraft: ${{ fromJson(needs.prepare-matrix.outputs.versions) }}
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x ./gradlew

      - name: build MC ${{ matrix.minecraft }}
        run: |
          TASK="build$(echo '${{ matrix.minecraft }}' | tr '.' '_')"
          echo "→ ./gradlew $TASK"
          ./gradlew "$TASK" --stacktrace

      - uses: actions/upload-artifact@v7
        with:
          name: omnichest-mc${{ matrix.minecraft }}
          path: fabric/build/libs/*.jar
          if-no-files-found: warn
