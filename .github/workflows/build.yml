# =====================================================================
# .github/workflows/build.yml
# ---------------------------------------------------------------------
#   push / PR で、 mods/*/versions/versions.json に登録された "実在する MC
#   バージョン" だけを対象に matrix build を回す。
#   バージョンはハードコードせず、 ./gradlew printVersionsJson から動的生成する
#   (全 Mod の buildable な MC の和集合 = Mod 非依存)。
# =====================================================================

name: build

on:
  push:
    branches: ['**']
    tags-ignore: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------
  # ① versions.json をパースして matrix を組み立てる
  # -------------------------------------------------------------------
  prepare-matrix:
    runs-on: ubuntu-24.04
    outputs:
      versions: ${{ steps.read.outputs.versions }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x ./gradlew

      - name: build matrix from all mods' versions.json
        id: read
        shell: bash
        run: |
          # 全 Mod (mods/*/versions/versions.json) の buildable な MC を
          # 和集合・重複排除した JSON 配列を Gradle から得る (Mod 非依存)。
          MATRIX=$(./gradlew -q printVersionsJson)
          echo "matrix => $MATRIX"
          echo "versions=$MATRIX" >> "$GITHUB_OUTPUT"

  # -------------------------------------------------------------------
  # ② Mojang / Fabric Meta API で実在性検証
  #    (validation 失敗時は build job を実行しない)
  # -------------------------------------------------------------------
  validate:
    needs: prepare-matrix
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x ./gradlew
      - name: validateVersions
        run: ./gradlew validateVersions --stacktrace

  # -------------------------------------------------------------------
  # ③ matrix の各 MC バージョンを並列ビルド
  # -------------------------------------------------------------------
  build:
    needs: [prepare-matrix, validate]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        minecraft: ${{ fromJson(needs.prepare-matrix.outputs.versions) }}
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x ./gradlew

      - name: build MC ${{ matrix.minecraft }}
        run: |
          TASK="build$(echo '${{ matrix.minecraft }}' | tr '.' '_')"
          echo "→ ./gradlew $TASK"
          ./gradlew "$TASK" --stacktrace

      - uses: actions/upload-artifact@v7
        with:
          name: mods-mc${{ matrix.minecraft }}
          # 最終 jar は mods/<modid>/fabric/build/libs/<MC>/ 配下に出る。
          # *-fabric.jar だけを拾えば sources(...-fabric-sources.jar) と
          # remap 版の中間 dev jar(...-dev.jar) は自動的に除外される。
          path: mods/*/fabric/build/libs/**/*-fabric.jar
          if-no-files-found: warn
